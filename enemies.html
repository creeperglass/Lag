<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>دشمنان</title>
  <meta name="description" content="توضیحات خفن: صفحهٔ دشمنان — صرفاً شوخی و دمو. گوربا ونیکس فعلاً دشمنان من است.">
  <style>
    :root{--bg:#060606;--card:#100606;--accent:#ff7b7b;--muted:#ffdede}
    body{font-family: Tahoma, system-ui, sans-serif; background:linear-gradient(180deg,#050505,#0b0b0b); color:var(--muted); display:flex; align-items:center; justify-content:center; height:100vh; margin:0}
    .card{max-width:820px; padding:36px; border-radius:14px; background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.35)); box-shadow:0 30px 70px rgba(0,0,0,0.6); text-align:center; border:1px solid rgba(255,80,80,0.06)}
    h1{font-size:1.8rem; margin:0 0 10px; color:#fff}
    p.lead{font-size:1.1rem; margin:0 0 16px; color:#ffdede}
    p.badge{display:inline-block; padding:8px 14px; border-radius:999px; background:linear-gradient(90deg,var(--accent),#ff5c5c); color:#200; font-weight:700}
    p.note{margin-top:18px; color:#ffbdbd}
    footer{margin-top:18px; font-size:0.9rem; color:#bfbfbf}
  </style>
</head>
<body>
  <div class="card" role="main">
    <h1>صفحهٔ دشمنان 🚩</h1>
    <p class="lead">گوربا ونیکس فعلاً دشمنان من است</p>
    <p class="badge">توضیحات خفن</p>
    <p class="note">این صفحه برای شوخی و نمایش ساخته شده — حسِ فان داره و هدفش اذیت یا آسیب نیست. اگر با این پروژه کسی‌رو اذیت کنید، مسئولیتش با خودتونه 😅</p>
    <footer>ــ ساخته شده با عشق و مود پرایوت :D</footer>
  </div>
</body>
</html>
