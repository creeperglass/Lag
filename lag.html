<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>سازنده متن فوق سنگین</title>

<style>

}

.box{
    max-width:650px;

    background:#1c1c2e;
    padding:20px;
    border-radius:15px;
}

    width:100%;

}

}

    margin:5px;
    border:none;
    border-radius:10px;

}

<body>

<div class="box">

<h2>⚡ متن‌ساز فوق فشرده</h2>

<textarea id="text" placeholder="شعار رو بنویس"></textarea>

<br>

<label>طول متن: <span id="l1">50</span></label>

<label>تعداد کاراکتر: <span id="c1">500</span></label>
<input type="range" min="10" max="20000" value="500" id="chars">

<br>

<label>
<input type="checkbox" id="lag"> 🔥 حالت لگ (خیلی سنگین)
</label>

<br>

<button onclick="generate()">⚡ تولید (۲ ثانیه)</button>
<button onclick="copyText()">📋 کپی</button>

<div id="status"></div>
<div id="output"></div>

</div>

⃢̸⃢̸⃢̸1̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃢⃢⃢`

document.getElementById("len").oninput = e=>{
  document.getElementById("l1").innerText = e.target.value;
}

document.getElementById("chars").oninput = e=>{
  document.getElementById("c1").innerText = e.target.value;
}

function heavyLoop(n){
    let x = 0;
    for(let i=0;i<n;i++){
        x += Math.sqrt(i%10+1);
    }
    return x;
}

function build(base, len, chars, lag){
    let out = "";

    for(let i=0;i<len;i++){
        out += base;

        for(let j=0;j<8;j++){
            out += fancy[Math.floor(Math.random()*fancy.length)];
        }

        if(lag){
            heavyLoop(5000);
        }
    }

    while(out.length < chars){
        out += fancy[Math.floor(Math.random()*fancy.length)];
        if(lag && Math.random() > 0.7){
            heavyLoop(8000);
        }
    }

    return out.slice(0, chars);
}

function generate(){
    let text = document.getElementById("text").value;
    let len = document.getElementById("len").value;
    let chars = document.getElementById("chars").value;
    let lag = document.getElementById("lag").checked;

    document.getElementById("status").innerText = "⏳ در حال سنگین کردن...";

    setTimeout(()=>{
        let result = build(text, len, chars, lag);

        document.getElementById("output").innerText = result;
        document.getElementById("status").innerText = "✅ آماده شد";
    },2000);
}

function copyText(){
    navigator.clipboard.writeText(
        document.getElementById("output").innerText
    );
    alert("کپی شد 📋");
}

</script>
