<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>سازنده متن فوق سنگین</title>

<style>
/* پس‌زمینه سبز و لوگوی درخشانِ خونی */
body{
    background: radial-gradient( circle at 20% 10%, #a8f78b 0%, #39b54a 25%, #0ea34a 50%, #0b8a3a 100% );
    color:white;
    font-family:tahoma;
    text-align:center;
    padding:20px;
    position:relative;
    overflow-x:hidden;
}

/* لوگوی پس‌زمینه (SVG) */
.bg-logo{
    position:fixed;
    left:50%;
    top:30%;
    transform:translate(-50%,-30%);
    width:1000px;
    max-width:120vw;
    pointer-events:none;
    z-index:0;
    opacity:0.22;
}

.box{
    max-width:650px;
    margin:auto;
    background:rgba(12,12,20,0.85);
    padding:20px;
    border-radius:15px;
    position:relative;
    z-index:1;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

textarea{
    width:100%;
    height:80px;
}

input[type=range]{
    width:100%;
}

button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#output{
    margin-top:15px;
    background:black;
    padding:10px;
    min-height:120px;
    white-space:pre-wrap;
    font-size:14px;
}

/* نورانی کردن و جلوهٔ خونیِ متن در SVG */
.svg-glow {
  filter: url(#neon);
}

@media (max-width:600px){
  .bg-logo{opacity:0.16; top:20%; width:800px}
  .box{margin:20px}
}
</style>
</head>

<body>

<!-- لوگوی پس‌زمینه SVG: نوشته "lag" با افکت خون و نور -->
<div class="bg-logo" aria-hidden="true">
<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="blood" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff5c5c"/>
      <stop offset="40%" stop-color="#d22121"/>
      <stop offset="100%" stop-color="#700000"/>
    </linearGradient>
    <filter id="dripBlur">
      <feGaussianBlur stdDeviation="1.2" />
    </filter>
  </defs>

  <!-- متن بزرگ -->
  <g class="svg-glow">
    <text x="50%" y="45%" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="220" fill="url(#blood)" stroke="#3b0000" stroke-width="4" paint-order="stroke">lag</text>

    <!-- قطره‌ها / خون چکیده زیر حروف (دست‌ساز) -->
    <g transform="translate(180,120) scale(0.9)" fill="#700000">
      <path d="M60 120c6 20 26 28 36 6 6-14 6-34-4-44-8-8-30-2-32 18-1 8 0 14 0 20z"/>
      <path d="M180 120c8 22 30 30 42 8 8-16 8-38-6-50-10-8-36 0-40 20-1 9 2 15 4 22z"/>
      <path d="M310 120c5 18 22 24 32 7 6-11 6-28-4-36-8-7-26-2-28 15-1 8 0 12 0 14z"/>
    </g>

    <!-- نکتهٔ نورانی کناری -->
    <g transform="translate(520,40) scale(0.5)">
      <circle cx="80" cy="80" r="80" fill="#e6ffea" opacity="0.06"/>
      <circle cx="80" cy="80" r="40" fill="#b6ffd2" opacity="0.04"/>
    </g>
  </g>

</svg>
</div>

<div class="box">

<h2>⚡ متن‌ساز فوق فشرده</h2>

<textarea id="text" placeholder="شعار ��و بنویس"></textarea>

<br>

<label>طول متن: <span id="l1">50</span></label>
<input type="range" min="10" max="500" value="50" id="len">

<label>تعداد کاراکتر: <span id="c1">500</span></label>
<input type="range" min="10" max="20000" value="500" id="chars">

<br>

<label>
<input type="checkbox" id="lag"> 🔥 حالت لگ (خیلی سنگین)
</label>

<br>

<button onclick="generate()">⚡ تولید (۲ ثانیه)</button>
<button onclick="copyText()">📋 کپی</button>

<div id="status"></div>
<div id="output"></div>

</div>

<script>

let fancy = [
"ᡃ⃝","⃢","̸","⃟","✦","✧",
"َ","ٌ","ـ","✺","✹",

// 🔥 رشته سنگین اضافه شده
`̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸2̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸2̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸3̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃢̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟̸⃟ٞ`
];

document.getElementById("len").oninput = e=>{
  document.getElementById("l1").innerText = e.target.value;
}

document.getElementById("chars").oninput = e=>{
  document.getElementById("c1").innerText = e.target.value;
}

function heavyLoop(n){
    let x = 0;
    for(let i=0;i<n;i++){
        x += Math.sqrt(i%10+1);
    }
    return x;
}

function build(base, len, chars, lag){
    let out = "";

    for(let i=0;i<len;i++){
        out += base;

        for(let j=0;j<8;j++){
            out += fancy[Math.floor(Math.random()*fancy.length)];
        }

        if(lag){
            heavyLoop(5000);
        }
    }

    while(out.length < chars){
        out += fancy[Math.floor(Math.random()*fancy.length)];
        if(lag && Math.random() > 0.7){
            heavyLoop(8000);
        }
    }

    return out.slice(0, chars);
}

function generate(){
    let text = document.getElementById("text").value;
    let len = document.getElementById("len").value;
    let chars = document.getElementById("chars").value;
    let lag = document.getElementById("lag").checked;

    document.getElementById("status").innerText = "⏳ در حال سنگین کردن...";

    setTimeout(()=>{
        let result = build(text, len, chars, lag);

        document.getElementById("output").innerText = result;
        document.getElementById("status").innerText = "✅ آماده شد";
    },2000);
}

function copyText(){
    navigator.clipboard.writeText(
        document.getElementById("output").innerText
    );
    alert("کپی شد 📋");
}

</script>

</body>
</html>
